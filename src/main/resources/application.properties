# App
spring.application.name=etf-advisor
server.port=8080

# H2 Datenbank
spring.datasource.url=jdbc:h2:mem:etfadvisor
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# H2 Konsole (erreichbar unter http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JSON schön formatiert
spring.jackson.serialization.indent-output=true

# Alpaca API--> muss noch in ne env
alpaca.api.key=DEIN_KEY_HIER
alpaca.api.secret=DEIN_SECRET_HIER
alpaca.api.baseUrl=https://data.alpaca.markets/v2

